name : Flutter CI

on:
  push:
   branches: 
     - main
  pull_request:
     branches:
       -main
  workflow_dispatch:       

jobs:
 analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps: 
        - name: Checkout repository
          uses: actions/checkout@v4


        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
              flutter-version: '3.32.8'
              channel: 'stable'
              cache: true

        - name: Cache pub dependencies
          uses: actions/cache@v4
          with:
             path: -/.pub-cache
             key : ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
             restore-keys: |
              ${{ runner.os }}-pub-      

        - name: Install dependencies
          run: flutter pub get
          
        - name: Run Flutter Analyze
          run: flutter analyze  

 test:
        name: Flutter Test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: analyze

        steps: 
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.32.8'
                channel: 'stable'
                cache: true

            - name: Cache pub dependencies
              uses: actions/cache@v4
              with:
                 path: -/.pub-cache
                 key : ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
                 restore-keys: |
                  ${{ runner.os }}-pub-   
                
            - name: Install dependencies
              run: flutter pub get
              
            - name: Run Flutter Tests
              run: flutter test --coverage  
 build:
        name: Build APK
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '17'
                
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.32.8'
                channel: 'stable'
                cache: true    
             
            - name: Cache pub dependencies
              uses: actions/cache@v4
              with:
                path: -/.pub-cache 
                key : ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
                restore-keys: |
                  ${{ runner.os }}-pub-
                    
            - name: Cache Gradle dependencies
              uses: actions/cache@v4
              with:
                path: |
                  ~/.gradle/caches
                  ~/.gradle/wrapper/
                key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts*','**/gradle-wrapper.properties' ) }}
                restore-keys: |
                  ${{ runner.os }}-gradle-          

            - name: Install dependencies    
              run: flutter pub get

            - name: Build Release APK
              run: flutter build apk --release  

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                name: polyglot-release-apk
                path: build/app/outputs/flutter-apk/app-release.apk
                retention-days: 30  
