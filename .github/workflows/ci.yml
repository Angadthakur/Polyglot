name : Flutter CI

on:
  push:
   branches: 
     - main

jobs:
 analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps: 
        - name: Checkout repository
          uses: actions/checkout@v4


        - name: Set up Flutter
          uses: subosito/flutter-action@v2
          with:
              flutter-version: '3.32.8'
              channel: 'stable'
              cache: true

        - name: Install dependencies
          run: flutter pub get
          
        - name: Run Flutter Analyze
          run: flutter analyze  

 test:
        name: Flutter Test
        runs-on: ubuntu-latest
        timeout-minutes: 15
        needs: analyze

        steps: 
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.32.8'
                channel: 'stable'
                cache: true
                
            - name: Install dependencies
              run: flutter pub get
              
            - name: Run Flutter Tests
              run: flutter test --coverage  
 build:
        name: Build APK
        runs-on: ubuntu-latest
        timeout-minutes: 30
        needs: test

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                distribution: 'temurin'
                java-version: '17'
                
            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.32.8'
                channel: 'stable'
                cache: true    

            - name: Install dependencies    
              run: flutter pub get

            - name: Build Release APK
              run: flutter build apk --release  

            - name: List build outputs
              run: find build/ -name "*.apk" 2>/dev/null  

            - name: Upload APK artifact
              uses: actions/upload-artifact@v4
              with:
                name: polyglot-release-apk
                path: build/outputs/flutter-apk/app-release.apk
                retention-days: 30  
